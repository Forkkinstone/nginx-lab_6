version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build: .
    container_name: lab6_php
    volumes:
      - ./www:/var/www/html
    expose:
      - "9000"
    depends_on:
      - db
      - redis
      - elasticsearch
      - clickhouse
  db:
    image: mysql:8.0
    container_name: lab6_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab6_db
      MYSQL_USER: lab6_user
      MYSQL_PASSWORD: lab6_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: lab6_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

  redis:
    image: redis:latest
    container_name: lab6_redis
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: lab6_clickhouse
    environment:
      - CLICKHOUSE_DB=lab6_db
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lab6_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

volumes:
  db_data:



      